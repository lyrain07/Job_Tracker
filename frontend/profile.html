<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Job Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="light-theme">
    <nav class="navbar">
        <div class="container">
            <a href="dashboard.html" class="logo">JobTracker</a>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="jobs.html">Jobs</a>
                <a href="tracker.html">Tracker</a>
                <a href="profile.html" class="active">Profile</a>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
            <div class="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <div class="sidebar-overlay"></div>
    <div class="mobile-sidebar">
        <a href="dashboard.html">Dashboard</a>
        <a href="jobs.html">Jobs</a>
        <a href="tracker.html">Tracker</a>
        <a href="profile.html">Profile</a>
        <button class="logout-btn" onclick="logout()" style="margin-top: 20px;">Logout</button>
    </div>

    <main class="container" style="padding-top: 100px;">

        <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
            <button class="btn-primary" style="width: auto; padding: 10px 24px;" onclick="openEditModal()">
                <i class="fas fa-user-edit" style="margin-right: 8px;"></i> Edit Your Profile
            </button>
        </div>

        <div style="display: grid; grid-template-columns: 280px 1fr; gap: 28px; align-items: start;">

            <!-- LEFT SIDEBAR -->
            <div class="card" style="padding: 32px 24px; text-align: center;">
                <div id="userInitial"
                    style="width:80px; height:80px; background:linear-gradient(135deg,#6366F1,#A855F7); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; font-size:2rem; color:white; font-weight:800;">
                    U</div>
                <h2 id="sideBarName" style="margin-bottom:4px; font-size:1.2rem;">User Name</h2>
                <p id="sideBarEmail" style="color:#64748b; font-size:0.9rem; margin-bottom:24px;">user@example.com</p>
                <div style="border-top:1px solid #e2e8f0; padding-top:20px;">
                    <p
                        style="font-size:0.72rem; font-weight:700; text-transform:uppercase; color:#94a3b8; margin-bottom:10px; letter-spacing:0.05em;">
                        Resume</p>
                    <a id="resumeBadge" href="#" target="_blank"
                        style="display:inline-block; padding:8px 16px; border-radius:8px; font-size:0.85rem; font-weight:600; background:#f1f5f9; color:#94a3b8; text-decoration:none;">
                        <i class="fas fa-file-pdf" style="margin-right:6px;"></i> No Resume Yet
                    </a>
                </div>
            </div>

            <!-- RIGHT MAIN -->
            <div style="display:flex; flex-direction:column; gap:24px;">

                <!-- About Me -->
                <div class="card">
                    <div class="card-header">
                        <h2>About Me</h2>
                    </div>
                    <div style="padding:24px 32px;">
                        <p id="profileBio" style="color:#64748b; line-height:1.7;">No bio yet. Click "Edit Your Profile"
                            to add one!</p>
                    </div>
                </div>

                <!-- Skills -->
                <div class="card">
                    <div class="card-header">
                        <h2>Professional Skills</h2>
                        <button onclick="openSkillsModal()"
                            style="padding:8px 16px; font-size:0.85rem; background:#f1f5f9; border:1px solid #e2e8f0; border-radius:10px; cursor:pointer; font-weight:600; color:#475569;">
                            <i class="fas fa-plus" style="margin-right:6px;"></i>Manage Skills
                        </button>
                    </div>
                    <div id="skillsList" style="padding:24px 32px; display:flex; flex-wrap:wrap; gap:10px;">
                        <p style="color:#94a3b8;">No skills added yet.</p>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Edit Profile Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Edit Profile</h2>
                <button onclick="closeEditModal()"
                    style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:#94a3b8;">&times;</button>
            </div>
            <div class="form-group" style="margin-top:20px;">
                <label for="editName">Full Name</label>
                <input type="text" id="editName" class="input-control">
            </div>
            <div class="form-group">
                <label for="editBio">Bio</label>
                <textarea id="editBio" class="input-control" rows="4"
                    placeholder="Tell us about yourself..."></textarea>
            </div>
            <div class="form-group">
                <label for="editResume">Resume URL</label>
                <input type="url" id="editResume" class="input-control" placeholder="https://drive.google.com/...">
            </div>
            <div id="profileMessage" style="display:none; margin-top:12px; padding:10px 16px; border-radius:8px;"></div>
            <div class="modal-actions" style="margin-top:24px;">
                <button class="logout-btn" onclick="closeEditModal()">Cancel</button>
                <button class="btn-primary" onclick="saveProfile()" style="width:auto; padding:12px 32px;">Save
                    Profile</button>
            </div>
        </div>
    </div>

    <!-- Manage Skills Modal — Search + Add style -->
    <div class="modal-overlay" id="skillsModal">
        <div class="modal" style="max-width:480px;">
            <div class="modal-header">
                <h2>Manage Skills</h2>
                <button onclick="closeSkillsModal()"
                    style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:#94a3b8;">&times;</button>
            </div>

            <!-- Selected skills chips -->
            <p
                style="font-size:0.8rem; font-weight:700; text-transform:uppercase; color:#94a3b8; margin:16px 0 8px; letter-spacing:0.05em;">
                Your Skills</p>
            <div id="selectedSkillsList"
                style="display:flex; flex-wrap:wrap; gap:8px; min-height:40px; margin-bottom:20px;"></div>

            <!-- Search + dropdown -->
            <p
                style="font-size:0.8rem; font-weight:700; text-transform:uppercase; color:#94a3b8; margin-bottom:8px; letter-spacing:0.05em;">
                Add a Skill</p>
            <div style="position:relative;">
                <input type="text" id="skillSearchInput" class="input-control"
                    placeholder="Search skills (e.g. Python, Figma...)" oninput="renderSkillDropdown(this.value)"
                    onfocus="renderSkillDropdown(this.value)" autocomplete="off" style="margin-bottom:0;">
                <div id="skillDropdown"
                    style="display:none; position:absolute; top:100%; left:0; right:0; background:white; border:1px solid #e2e8f0; border-radius:10px; max-height:200px; overflow-y:auto; z-index:100; box-shadow:0 8px 24px rgba(0,0,0,0.08); margin-top:4px;">
                </div>
            </div>

            <div id="skillsMessage" style="display:none; margin-top:16px; padding:10px 16px; border-radius:8px;"></div>

            <div class="modal-actions" style="margin-top:28px;">
                <button class="logout-btn" onclick="closeSkillsModal()">Cancel</button>
                <button class="btn-primary" onclick="saveSkills()" style="width:auto; padding:12px 32px;">Save
                    Changes</button>
            </div>
        </div>
    </div>

    <script src="navigation.js"></script>
    <script src="profile.js"></script>
</body>

</html>
