<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Job Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">
    <div class="auth-card">
        <h1>Job Tracker</h1>
        <p class="auth-subtitle" id="authSubtitle">Sign In to Begin</p>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="event.preventDefault(); login();">
            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" class="input-control" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" class="input-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Login</button>
            <p class="auth-switch">
                Don't have an account?
                <a onclick="showRegisterPage()" class="auth-link">Sign up</a>
            </p>
        </form>

        <!-- Register Form (hidden by default) -->
        <form id="registerForm" style="display: none;" onsubmit="event.preventDefault(); register();">
            <div class="form-group">
                <label for="registerName">Full Name</label>
                <input type="text" id="registerName" class="input-control" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="registerEmail">Email Address</label>
                <input type="email" id="registerEmail" class="input-control" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
                <label for="registerPassword">Password</label>
                <input type="password" id="registerPassword" class="input-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Create Account</button>
            <p class="auth-switch">
                Already have an account?
                <a onclick="showLoginPage()" class="auth-link">Login</a>
            </p>
        </form>

        <!-- Feedback message (shown on error/success) -->
        <div id="message" class="feedback-message" style="display: none;"></div>
    </div>

    <script src="login.js"></script>
</body>

</html>
