<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Jobs - Job Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html,
        body {
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>

<body class="light-theme">
    <nav class="navbar">
        <div class="container">
            <a href="dashboard.html" class="logo">JobTracker</a>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="jobs.html" class="active">Jobs</a>
                <a href="tracker.html">Tracker</a>
                <a href="profile.html">Profile</a>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
            <div class="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <div class="sidebar-overlay"></div>
    <div class="mobile-sidebar">
        <a href="dashboard.html">Dashboard</a>
        <a href="jobs.html">Jobs</a>
        <a href="tracker.html">Tracker</a>
        <a href="profile.html">Profile</a>
        <button class="logout-btn" onclick="logout()" style="margin-top:20px;">Logout</button>
    </div>

    <div class="page-shell">
        <div class="page-top-bar">
            <h1>Browse Jobs</h1>
        </div>

        <div class="jobs-layout">
            <div class="jobs-left">
                <div class="jobs-left-header">
                    <div class="search-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" id="jobSearch" class="jobs-search-input"
                            placeholder="Search title or company..." oninput="filterJobs()">
                    </div>
                    <div class="filter-row">
                        <select id="filterType" class="filter-select" onchange="filterJobs()">
                            <option value="">All Types</option>
                            <option value="Full-time">Full-time</option>
                            <option value="Part-time">Part-time</option>
                            <option value="Contract">Contract</option>
                            <option value="Remote">Remote</option>
                        </select>
                        <select id="filterLocation" class="filter-select" onchange="filterJobs()">
                            <option value="">All Locations</option>
                        </select>
                    </div>
                    <p class="jobs-count" id="jobsCount">Loading...</p>
                </div>
                <div class="jobs-list" id="jobsList">
                    <div class="list-empty">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Loading jobs...</p>
                    </div>
                </div>
            </div>


            <div class="jobs-right" id="jobDetail">
                <div class="detail-empty">
                    <i class="fas fa-briefcase"></i>
                    <p>Select a job to see details</p>
                </div>
            </div>

        </div>
    </div>


    <div class="modal-overlay" id="confirmModal">
        <div class="modal" style="max-width:420px; text-align:center; padding:36px 32px;">
            <div class="modal-icon"><i class="fas fa-check-circle"></i></div>
            <h2>Did you apply?</h2>
            <p class="modal-subtitle">We'll add this to your tracker only if you've already submitted your application
                externally.</p>
            <div class="modal-job-info">
                <div class="mj-title" id="modalJobTitle">—</div>
                <div class="mj-company" id="modalJobCompany">—</div>
            </div>
            <div class="feedback-message" id="feedbackMsg"></div>
            <div class="modal-actions">
                <button class="logout-btn" onclick="closeConfirmModal()">Not yet</button>
                <button class="btn-track" id="confirmYesBtn" onclick="confirmApply()">
                    <i class="fas fa-bookmark"></i> Confirm
                </button>
            </div>
        </div>
    </div>

    <script src="navigation.js"></script>
    <script src="jobs.js"></script>
</body>

</html>
