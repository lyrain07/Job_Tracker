<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Jobs - Job Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ── Page shell ── */
        html,
        body {
            height: 100%;
            overflow: hidden;
            /* prevent page scroll — panels scroll internally */
        }

        .page-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding-top: 72px;
            /* navbar height */
            box-sizing: border-box;
        }

        .page-top-bar {
            padding: 16px 40px 12px;
            flex-shrink: 0;
        }

        .page-top-bar h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--lt-text-main);
            margin-bottom: 2px;
        }

        .page-top-bar p {
            color: var(--lt-text-muted);
            font-size: 0.9rem;
        }

        /* ── Dual pane fills remaining height ── */
        .jobs-layout {
            display: grid;
            grid-template-columns: 360px 1fr;
            flex: 1;
            /* fill all remaining vertical space */
            min-height: 0;
            /* allow flex child to shrink */
            margin: 0 40px 24px;
            background: #ffffff;
            border-radius: 20px;
            border: 1px solid var(--lt-border);
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }

        /* ── Left panel ── */
        .jobs-left {
            border-right: 1px solid var(--lt-border);
            display: flex;
            flex-direction: column;
            background: #f8fafc;
            min-height: 0;
        }

        .jobs-left-header {
            padding: 16px;
            border-bottom: 1px solid var(--lt-border);
            background: #ffffff;
            flex-shrink: 0;
        }

        .search-wrapper {
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--lt-text-muted);
            font-size: 0.82rem;
        }

        .jobs-search-input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border: 1px solid var(--lt-border);
            border-radius: 100px;
            font-size: 0.88rem;
            font-family: 'Inter', sans-serif;
            color: var(--lt-text-main);
            background: #f8fafc;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .jobs-search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .filter-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .filter-select {
            flex: 1;
            padding: 7px 10px;
            border: 1px solid var(--lt-border);
            border-radius: 8px;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            color: var(--lt-text-muted);
            background: #f8fafc;
            outline: none;
            cursor: pointer;
        }

        .jobs-count {
            font-size: 0.76rem;
            color: var(--lt-text-muted);
            margin-top: 8px;
            font-weight: 600;
        }

        /* KEY FIX: jobs list scrolls independently */
        .jobs-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            min-height: 0;
        }

        .jobs-list::-webkit-scrollbar {
            width: 3px;
        }

        .jobs-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .jobs-list::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .job-list-item {
            background: #ffffff;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.18s ease;
        }

        .job-list-item:hover {
            border-color: #e0e7ff;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.08);
        }

        .job-list-item.active {
            border-color: var(--primary);
            background: #eef2ff;
        }

        .job-item-title {
            font-size: 0.92rem;
            font-weight: 700;
            color: var(--lt-text-main);
            margin-bottom: 3px;
        }

        .job-item-company {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 7px;
        }

        .job-item-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .job-item-tag {
            font-size: 0.72rem;
            padding: 2px 8px;
            border-radius: 100px;
            background: #f1f5f9;
            color: var(--lt-text-muted);
            font-weight: 500;
        }

        .list-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--lt-text-muted);
        }

        .list-empty i {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
            opacity: 0.3;
        }

        /* ── Right panel ── */
        .jobs-right {
            display: flex;
            flex-direction: column;
            background: #ffffff;
            min-height: 0;
            overflow: hidden;
            /* children manage their own scroll */
        }

        .detail-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--lt-text-muted);
            padding: 40px;
            text-align: center;
        }

        .detail-empty i {
            font-size: 3.5rem;
            margin-bottom: 16px;
            opacity: 0.12;
        }

        /* KEY FIX: action bar pinned at TOP, description scrolls below */
        .detail-action-bar {
            padding: 16px 32px;
            border-bottom: 1px solid var(--lt-border);
            background: #ffffff;
            flex-shrink: 0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* KEY FIX: description area scrolls independently */
        .detail-scroll-area {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            padding: 28px 32px 32px;
        }

        .detail-scroll-area::-webkit-scrollbar {
            width: 3px;
        }

        .detail-scroll-area::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .job-detail-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--lt-text-main);
            margin-bottom: 4px;
        }

        .job-detail-company {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 14px;
        }

        .job-detail-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }

        .detail-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 100px;
            background: #f1f5f9;
            font-size: 0.82rem;
            color: var(--lt-text-muted);
            font-weight: 600;
        }

        .job-desc-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--lt-text-muted);
            margin-bottom: 12px;
            border-top: 1px solid var(--lt-border);
            padding-top: 20px;
        }

        .job-desc-text {
            font-size: 0.93rem;
            color: var(--lt-text-main);
            line-height: 1.78;
        }

        /* ── Buttons ── */
        .btn-track {
            flex: 1;
            padding: 11px 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            font-family: 'Inter', sans-serif;
        }

        .btn-track:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.3);
        }

        .btn-track:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .btn-track.tracked {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .btn-ext-link {
            padding: 11px 16px;
            background: #f1f5f9;
            color: var(--lt-text-muted);
            border: 1px solid var(--lt-border);
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        .btn-ext-link:hover {
            background: #e2e8f0;
            color: var(--lt-text-main);
        }

        /* ── Modal ── */
        .modal-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 1.6rem;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .modal h2 {
            font-size: 1.4rem;
            margin-bottom: 6px;
            color: var(--lt-text-main);
        }

        .modal-subtitle {
            color: var(--lt-text-muted);
            font-size: 0.88rem;
            margin-bottom: 16px;
        }

        .modal-job-info {
            background: #f8fafc;
            border: 1px solid var(--lt-border);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 16px;
            text-align: left;
        }

        .mj-title {
            font-weight: 700;
            font-size: 0.92rem;
            color: var(--lt-text-main);
        }

        .mj-company {
            font-size: 0.82rem;
            color: var(--primary);
            font-weight: 600;
            margin-top: 2px;
        }

        .feedback-message {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 14px;
            display: none;
        }

        .feedback-success {
            background: #ecfdf5;
            color: #059669;
        }

        .feedback-error {
            background: #fef2f2;
            color: #dc2626;
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {

            html,
            body {
                overflow: auto;
            }

            .page-shell {
                height: auto;
                overflow: visible;
            }

            .jobs-layout {
                grid-template-columns: 1fr;
                margin: 0 16px 24px;
                height: auto;
            }

            .jobs-left {
                height: 50vh;
                border-right: none;
                border-bottom: 1px solid var(--lt-border);
            }

            .jobs-right {
                height: 70vh;
            }
        }
    </style>
</head>

<body class="light-theme">
    <nav class="navbar">
        <div class="container">
            <a href="dashboard.html" class="logo">JobTracker<span>.</span></a>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="jobs.html" class="active">Jobs</a>
                <a href="tracker.html">Tracker</a>
                <a href="profile.html">Profile</a>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
            <div class="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <div class="sidebar-overlay"></div>
    <div class="mobile-sidebar">
        <a href="dashboard.html">Dashboard</a>
        <a href="jobs.html">Jobs</a>
        <a href="tracker.html">Tracker</a>
        <a href="profile.html">Profile</a>
        <button class="logout-btn" onclick="logout()" style="margin-top:20px;">Logout</button>
    </div>

    <div class="page-shell">
        <div class="page-top-bar">
            <h1>Browse Jobs</h1>
            <p>Find and track your next opportunity.</p>
        </div>

        <div class="jobs-layout">

            <!-- LEFT: scrollable job list -->
            <div class="jobs-left">
                <div class="jobs-left-header">
                    <div class="search-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" id="jobSearch" class="jobs-search-input"
                            placeholder="Search title or company..." oninput="filterJobs()">
                    </div>
                    <div class="filter-row">
                        <select id="filterType" class="filter-select" onchange="filterJobs()">
                            <option value="">All Types</option>
                            <option value="Full-time">Full-time</option>
                            <option value="Part-time">Part-time</option>
                            <option value="Contract">Contract</option>
                            <option value="Remote">Remote</option>
                        </select>
                        <select id="filterLocation" class="filter-select" onchange="filterJobs()">
                            <option value="">All Locations</option>
                        </select>
                    </div>
                    <p class="jobs-count" id="jobsCount">Loading...</p>
                </div>

                <!-- This div scrolls — all jobs visible by scrolling -->
                <div class="jobs-list" id="jobsList">
                    <div class="list-empty">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Loading jobs...</p>
                    </div>
                </div>
            </div>

            <!-- RIGHT: action bar pinned top, description scrolls -->
            <div class="jobs-right" id="jobDetail">
                <div class="detail-empty">
                    <i class="fas fa-briefcase"></i>
                    <p>Select a job to see details</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal" style="max-width:420px; text-align:center; padding:36px 32px;">
            <div class="modal-icon"><i class="fas fa-check-circle"></i></div>
            <h2>Did you apply?</h2>
            <p class="modal-subtitle">We'll add this to your tracker only if you've already submitted your application
                externally.</p>
            <div class="modal-job-info">
                <div class="mj-title" id="modalJobTitle">—</div>
                <div class="mj-company" id="modalJobCompany">—</div>
            </div>
            <div class="feedback-message" id="feedbackMsg"></div>
            <div class="modal-actions">
                <button class="logout-btn" onclick="closeConfirmModal()">Not yet</button>
                <button class="btn-track" id="confirmYesBtn" onclick="confirmApply()">
                    <i class="fas fa-bookmark"></i> Yes, track it!
                </button>
            </div>
        </div>
    </div>

    <script src="navigation.js"></script>
    <script src="jobs.js"></script>
</body>

</html>
