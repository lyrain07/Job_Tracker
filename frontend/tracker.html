<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Tracker - Job Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="light-theme">

    <nav class="navbar">
        <div class="container">
            <a href="dashboard.html" class="logo">JobTracker</a>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="jobs.html">Jobs</a>
                <a href="tracker.html" class="active">Tracker</a>
                <a href="profile.html">Profile</a>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <div class="sidebar-overlay"></div>
    <div class="mobile-sidebar">
        <a href="dashboard.html">Dashboard</a>
        <a href="jobs.html">Jobs</a>
        <a href="tracker.html">Tracker</a>
        <a href="profile.html">Profile</a>
        <button class="logout-btn" onclick="logout()" style="margin-top: 20px;">Logout</button>
    </div>


    <main class="container pt-100">
        <header class="page-header py-20">
            <div>
                <h1>Application Tracker</h1>
                <p class="page-subtitle">Manage and monitor your job application progress.</p>
            </div>
            <button class="logout-btn" id="editTrackerBtn" onclick="toggleEditMode()">
                <i class="fas fa-edit mr-8"></i>Edit Tracker
            </button>
        </header>

        <section class="card">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Company</th>
                            <th>Job Title</th>
                            <th>Salary</th>
                            <th>Applied Date</th>
                            <th>Status</th>
                            <th>Interview Round</th>
                            <th>Notes</th>
                            <th class="edit-col w-80" style="display: none;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="trackerBody">
                        <tr>
                            <td colspan="8" class="table-loader">Loading tracker...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>


    <div class="modal-overlay" id="detailModal">
        <div class="modal modal-md">
            <div class="modal-header">
                <h2 id="detailTitle">Job Details</h2>
                <button class="close-modal" onclick="closeDetailModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="job-detail-header detail-header-clean">
                    <p class="sub-title mb-8" id="detailCompany"></p>
                    <div class="job-meta mt-16" id="detailMeta"></div>
                </div>
                <div class="job-description">
                    <h4 class="mb-12 fw-700">Description</h4>
                    <p class="bio-text detail-text" id="detailDesc"></p>

                    <div class="mb-24">
                        <h4 class="mb-12 fw-700">Update Application</h4>
                        <div class="flex-group">
                            <div class="form-group form-group-flex">
                                <label class="label-sm">Status</label>
                                <select id="updateStatus" class="input-control" onchange="toggleRoundInput()">
                                    <option value="Applied">Applied</option>
                                    <option value="Interviewing">Interviewing</option>
                                    <option value="Rejected">Rejected</option>
                                    <option value="Hired">Hired</option>
                                </select>
                            </div>
                            <div id="roundInputGroup" class="form-group form-group-flex" style="display: none;">
                                <label class="label-sm">Interview Round</label>
                                <select id="updateRound" class="input-control">
                                    <option value="1">Round 1</option>
                                    <option value="2">Round 2</option>
                                    <option value="3">Round 3</option>
                                    <option value="4">Round 4</option>
                                    <option value="5">Round 5</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <h4 class="mb-12 fw-700">My Notes</h4>
                    <div id="displayNotes" class="bio-text notes-display"></div>
                    <textarea id="detailNotes" class="input-control notes-input"
                        placeholder="Add or edit your note here..."></textarea>
                </div>
                <div class="modal-actions modal-footer">
                    <button class="btn-primary btn-auto" id="saveTrackerBtn" onclick="saveApplicationDetails()">Save
                        Changes</button>
                    <button class="logout-btn btn-auto h-48" onclick="closeDetailModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="navigation.js"></script>
    <script src="tracker.js"></script>
</body>

</html>
