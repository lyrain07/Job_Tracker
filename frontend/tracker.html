<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Tracker - Job Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="light-theme">

    <nav class="navbar">
        <div class="container">
            <a href="dashboard.html" class="logo">JobTracker</a>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="jobs.html">Jobs</a>
                <a href="tracker.html" class="active">Tracker</a>
                <a href="profile.html">Profile</a>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <div class="sidebar-overlay"></div>
    <div class="mobile-sidebar">
        <a href="dashboard.html">Dashboard</a>
        <a href="jobs.html">Jobs</a>
        <a href="tracker.html">Tracker</a>
        <a href="profile.html">Profile</a>
        <button class="logout-btn" onclick="logout()" style="margin-top: 20px;">Logout</button>
    </div>


    <main class="container" style="padding-top: 100px;">
        <header class="page-header" style="padding: 20px 0;">
            <div>
                <h1>Application Tracker</h1>
                <p class="page-subtitle">Manage and monitor your job application progress.</p>
            </div>
            <button class="logout-btn" id="editTrackerBtn" onclick="toggleEditMode()">
                <i class="fas fa-edit" style="margin-right: 8px;"></i>Edit Tracker
            </button>
        </header>

        <section class="card">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Company</th>
                            <th>Job Title</th>
                            <th>Salary</th>
                            <th>Applied Date</th>
                            <th>Status</th>
                            <th>Interview Round</th>
                            <th>Notes</th>
                            <th class="edit-col" style="display: none; width: 80px;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="trackerBody">
                        <tr>
                            <td colspan="8" style="text-align:center; padding: 40px;">Loading tracker...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>


    <div class="modal-overlay" id="detailModal">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-header">
                <h2 id="detailTitle">Job Details</h2>
                <button class="close-modal" onclick="closeDetailModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="job-detail-header" style="border: none; padding-bottom: 20px;">
                    <p class="sub-title" id="detailCompany" style="margin-bottom: 8px;"></p>
                    <div class="job-meta" style="margin-top: 16px;" id="detailMeta"></div>
                </div>
                <div class="job-description">
                    <h4 style="margin-bottom: 12px; font-weight: 700;">Description</h4>
                    <p class="bio-text" id="detailDesc"
                        style="color: var(--lt-text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 24px;">
                    </p>

                    <div style="margin-bottom: 24px;">
                        <h4 style="margin-bottom: 12px; font-weight: 700;">Update Application</h4>
                        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                            <div class="form-group" style="flex: 1; min-width: 200px; margin-bottom: 0;">
                                <label style="font-size: 0.8rem; color: var(--lt-text-muted);">Status</label>
                                <select id="updateStatus" class="input-control" onchange="toggleRoundInput()">
                                    <option value="Applied">Applied</option>
                                    <option value="Interviewing">Interviewing</option>
                                    <option value="Rejected">Rejected</option>
                                    <option value="Hired">Hired</option>
                                </select>
                            </div>
                            <div id="roundInputGroup" class="form-group"
                                style="flex: 1; min-width: 200px; margin-bottom: 0; display: none;">
                                <label style="font-size: 0.8rem; color: var(--lt-text-muted);">Interview Round</label>
                                <select id="updateRound" class="input-control">
                                    <option value="1">Round 1</option>
                                    <option value="2">Round 2</option>
                                    <option value="3">Round 3</option>
                                    <option value="4">Round 4</option>
                                    <option value="5">Round 5</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <h4 style="margin-bottom: 12px; font-weight: 700;">My Notes</h4>
                    <div id="displayNotes" class="bio-text"
                        style="font-style: italic; background: #f8fafc; padding: 12px; border-radius: 8px; margin-bottom: 12px; color: var(--lt-text-muted); font-size: 0.9rem; min-height: 40px;">
                    </div>
                    <textarea id="detailNotes" class="input-control"
                        style="width: 100%; min-height: 100px; padding: 12px; border: 1px solid var(--lt-border); border-radius: 8px; font-family: inherit; font-size: 0.95rem; resize: vertical;"
                        placeholder="Add or edit your note here..."></textarea>
                </div>
                <div class="modal-actions"
                    style="margin-top: 32px; border-top: 1px solid var(--lt-border); padding-top: 24px;">
                    <button class="btn-primary" id="saveTrackerBtn" style="width: auto; padding: 12px 32px;"
                        onclick="saveApplicationDetails()">Save Changes</button>
                    <button class="logout-btn" style="width: auto; padding: 12px 32px; height: 48px;"
                        onclick="closeDetailModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="navigation.js"></script>
    <script src="tracker.js"></script>
</body>

</html>
